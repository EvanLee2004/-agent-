config_version: 5
log_level: info
token_usage:
  enabled: false
models:
- name: minimax-main
  display_name: MiniMax-M2.7
  use: langchain_openai:ChatOpenAI
  model: MiniMax-M2.7
  api_key: $MINIMAX_API_KEY
  base_url: https://api.minimaxi.com/v1
  request_timeout: 600.0
  max_retries: 2
  max_tokens: 4096
  temperature: 1.0
  supports_thinking: true
  supports_vision: false
tool_groups:
- name: web
- name: file:read
- name: file:write
- name: bash
- name: finance
tools:
- name: web_search
  group: web
  use: deerflow.community.ddg_search.tools:web_search_tool
- name: web_fetch
  group: web
  use: deerflow.community.jina_ai.tools:web_fetch_tool
- name: image_search
  group: web
  use: deerflow.community.image_search.tools:image_search_tool
- name: ls
  group: file:read
  use: deerflow.sandbox.tools:ls_tool
- name: read_file
  group: file:read
  use: deerflow.sandbox.tools:read_file_tool
- name: write_file
  group: file:write
  use: deerflow.sandbox.tools:write_file_tool
- name: str_replace
  group: file:write
  use: deerflow.sandbox.tools:str_replace_tool
- name: bash
  group: bash
  use: deerflow.sandbox.tools:bash_tool
- name: record_voucher
  group: finance
  use: accounting.record_voucher_tool:record_voucher_tool
- name: query_vouchers
  group: finance
  use: accounting.query_vouchers_tool:query_vouchers_tool
- name: record_cash_transaction
  group: finance
  use: cashier.record_cash_transaction_tool:record_cash_transaction_tool
- name: query_cash_transactions
  group: finance
  use: cashier.query_cash_transactions_tool:query_cash_transactions_tool
- name: calculate_tax
  group: finance
  use: tax.calculate_tax_tool:calculate_tax_tool
- name: audit_voucher
  group: finance
  use: audit.audit_voucher_tool:audit_voucher_tool
- name: reply_with_rules
  group: finance
  use: rules.reply_with_rules_tool:reply_with_rules_tool
- name: generate_fiscal_task_prompt
  group: finance
  use: department.collaboration.generate_fiscal_task_prompt_tool:generate_fiscal_task_prompt_tool
tool_search:
  enabled: false
sandbox:
  use: deerflow.sandbox.local:LocalSandboxProvider
  allow_host_bash: false
  bash_output_max_chars: 20000
  read_file_output_max_chars: 50000
skills:
  # $DEER_FLOW_SKILLS_PATH 由 DeerFlowRuntimeAssetsService 在启动时注入 os.environ，
  # DeerFlow 的 resolve_env_variables() 会在读取配置时展开此占位符。
  path: $DEER_FLOW_SKILLS_PATH
  container_path: /mnt/skills
title:
  enabled: false
  max_words: 6
  max_chars: 60
  model_name: null
summarization:
  enabled: false
memory:
  enabled: true
  debounce_seconds: 30
  max_facts: 100
  fact_confidence_threshold: 0.7
  injection_enabled: true
  max_injection_tokens: 2000
